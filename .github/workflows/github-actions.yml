name: bowling game CI (run tests and publish Allure report)

on:
  #run when code is pushed to the main branch or when a pull request is opened against the main branch and show button to run manually in the Actions tab
  push:
    branches: [main]

  pull_request:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  #run tests and generate  allure report and publish it to github pages
  test-and-publish:

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

       #downloads  GitHub repository into the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

       #allure CLI requires Java so
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure
        run: |
          ALLURE_VERSION=2.44.0
          wget https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -zxf allure-${ALLURE_VERSION}.tgz
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          echo "/opt/allure/bin" >> $GITHUB_PATH

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        
        #doing parallel exceution
      - name: Run Tests
        run: pytest tests -n auto --alluredir=allure-results

      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

       #prepares gitHub pages deployment
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5


      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4